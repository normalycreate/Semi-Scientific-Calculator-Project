<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/14.8.1/math.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>
    <title>Calculator</title>
</head>
<body>
    <div class="essentialMenu">
        <button class="theme"><i class="fa-solid fa-circle-half-stroke"></i></button>
        <button class="advanced"><i class="fa-solid fa-square-plus"></i></button>
    </div>
    <div class="container">
        <div class="calculator">
            <input type="text" class="display" id="display" disabled>
            <div class="button">
                <button class="numButton clear" data-action="clear"><i class="fa-solid fa-border-none"></i></button>
                <button class="numButton" data-action="delete"><i class="fa-solid fa-delete-left"></i></button>
                <button class="numButton" data-value="."><i class="fa-regular fa-circle-dot"></i></button>
                <button class="numButton" data-action="squareRoot"><i class="fa-sharp fa-solid fa-square-root-variable"></i></button>
                <button class="numButton operatorButton" data-value="+"><i class="fa-solid fa-plus"></i></button>
                <button class="numButton" data-value="9">9</button>
                <button class="numButton" data-value="8">8</button>
                <button class="numButton" data-value="7">7</button>
                <button class="numButton operatorButton" data-value="-"><i class="fa-solid fa-minus"></i></button>
                <button class="numButton" data-value="6">6</button>
                <button class="numButton" data-value="5">5</button>
                <button class="numButton" data-value="4">4</button>
                <button class="numButton operatorButton" data-value="*"><i class="fa-solid fa-xmark"></i></button>
                <button class="numButton" data-value="3">3</button>
                <button class="numButton" data-value="2">2</button>
                <button class="numButton" data-value="1">1</button>
                <button class="numButton operatorButton" data-value="/"><i class="fa-solid fa-divide"></i></button>
                <button class="numButton" data-value="00">00</button>
                <button class="numButton" data-value="0">0</button>
                <button class="numButton equal" data-action="equal" data-value="="><i class="fa-solid fa-equals"></i></button>
            </div>
            <!--UNFINISHED FEATURE AND WILL BE ADDED IN THE FUTURE-->
            <div class="advancedFeature">
                <button class="numButton clear" data-action="clear"><i class="fa-solid fa-border-none"></i></button>
                <button class="numButton fontAdjustment" data-action="delete"><i class="fa-solid fa-delete-left"></i></button>
                <button class="numButton fontAdjustment" data-action="exponent"><i class="fa-solid fa-superscript"></i></button> <!--To Calculate Exponential-->
                <button class="numButton fontAdjustment" data-action="modulo">%</button> <!--Modulo % Function-->
                <button class="numButton fontAdjustment" data-action="factorial">!</button> <!--Factorial-->
                <button class="numButton fontAdjustment" data-action="numberGenerator">?</button> <!--Random Number Generator-->
                <button class="numButton fontAdjustment" data-action="gcd">GCD</button> <!--Greatest Common Factor (GCF) Function-->
                <button class="numButton fontAdjustment" data-action="hcf">HCF</button> <!--Highest Common Factor (HCF) Function-->
                <button class="numButton fontAdjustment" data-action="rounding">R</button> <!--Rounding Function-->
                <button class="numButton fontAdjustment" data-action="sin">Sin</button> 
                <button class="numButton fontAdjustment" data-action="cos">Cos</button>
                <button class="numButton fontAdjustment" data-action="tan">Tan</button> 
                <button class="numButton fontAdjustment" data-action="pi">π</button> <!--Pi 3,14 Function-->
                <button class="numButton fontAdjustment" data-action="cosecan">Csc</button>
                <button class="numButton fontAdjustment" data-action="secan">Sec</button> 
                <button class="numButton fontAdjustment" data-action="cotan">Cot</button>
                <button class="numButton fontAdjustment" data-action="logarithm">log</button> 
                <button class="numButton fontAdjustment" data-action="parenthesis-right">(</button>
                <button class="numButton fontAdjustment" data-action="parenthesis-left">)</button>
                <button class="numButton equal" data-action="equal" data-value="="><i class="fa-solid fa-equals"></i></button>
            </div>
        </div>
    </div>
</body>
</html>
